services:
  aegis-api:
    build: .
    container_name: aegis-api
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./workspace:/app/workspace
      - ./sample_services:/app/sample_services
      - ./.git:/app/.git:ro
    depends_on:
      kafka:
        condition: service_started
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
      prometheus:
        condition: service_started
    networks:
      - aegis-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: aegis-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - aegis-net

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: aegis-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - aegis-net

  temporal-postgres:
    image: postgres:16
    container_name: aegis-temporal-postgres
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
      POSTGRES_DB: temporal
    ports:
      - "5433:5432"
    networks:
      - aegis-net

  temporal:
    image: temporalio/auto-setup:1.25.2
    container_name: aegis-temporal
    depends_on:
      - temporal-postgres
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgres
    ports:
      - "7233:7233"
    networks:
      - aegis-net

  temporal-ui:
    image: temporalio/ui:2.31.2
    container_name: aegis-temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8080
    ports:
      - "8233:8080"
    networks:
      - aegis-net

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: aegis-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - aegis-net

  neo4j:
    image: neo4j:5.26
    container_name: aegis-neo4j
    environment:
      NEO4J_AUTH: neo4j/aegis-password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - aegis-net

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: aegis-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - aegis-net

  grafana:
    image: grafana/grafana:11.4.0
    container_name: aegis-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - aegis-net

networks:
  aegis-net:
    driver: bridge

volumes:
  qdrant_data:
  neo4j_data:
  prometheus_data:
  grafana_data:
